name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
          python-version: "3.14"

      - name: Sync
        run: uv sync --all-groups

      - name: Ruff check
        run: uv run ruff check src tests alembic

      - name: Ruff format
        run: uv run ruff format --check src tests alembic

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest tests/unit -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t positions-service:ci .
