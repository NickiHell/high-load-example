services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-positions}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-positions}
      POSTGRES_DB: ${POSTGRES_DB:-positions}
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: docker.io/apache/kafka:3.8.0
    ports:
      - "${KAFKA_PUBLISH_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s

  # Топик до первого сообщения от app — иначе Logstash на старте видит UNKNOWN_TOPIC_OR_PARTITION,
  # а в Kibana нет индексов, пока не было ни одного успешного POST /positions.
  kafka-init:
    image: docker.io/apache/kafka:3.8.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic positions --partitions 1 --replication-factor 1
        echo "Kafka topic positions is ready."
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PUBLISH_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-positions}:${POSTGRES_PASSWORD:-positions}@postgres:5432/${POSTGRES_DB:-positions}}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_TOPIC_POSITIONS: ${KAFKA_TOPIC_POSITIONS:-positions}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-positions-service}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
      LOAD_GENERATOR_ENABLED: ${LOAD_GENERATOR_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "${PROMETHEUS_PUBLISH_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "${GRAFANA_PUBLISH_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "${ELASTICSEARCH_PUBLISH_PORT:-9200}:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    ports:
      - "${KIBANA_PUBLISH_PORT:-5601}:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    volumes:
      - ./kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 120s
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana-setup:
    image: curlimages/curl:8.10.1
    environment:
      KIBANA_URL: http://kibana:5601
    volumes:
      - ./kibana/import:/import:ro
    entrypoint: ["/bin/sh", "/import/setup.sh"]
    depends_on:
      kibana:
        condition: service_healthy
    restart: "no"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

volumes:
  pgdata:
