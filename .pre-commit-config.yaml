# Те же инструменты, что в CI: ruff (lint + format), mypy.
# Установка: uv sync --all-groups && uv run pre-commit install
default_install_hook_types: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        files: ^(src|tests|alembic)/

      - id: ruff-check
        name: ruff check --fix
        entry: uv run ruff check --fix
        language: system
        types: [python]
        files: ^(src|tests|alembic)/

      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright
        args: [src]
        language: system
        pass_filenames: false
        always_run: true
